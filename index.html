<!DOCTYPE html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MyReader - Modern PDF Reader</title>

    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --bg-dark: #0f172a;
        --bg-sidebar: #1e293b;
        --bg-canvas: #f1f5f9;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --white: #ffffff;
        --player-bg: rgba(255, 255, 255, 0.95);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", -apple-system, sans-serif;
      }

      /* Prevent the entire website/browser from zooming or bouncing */
      html,
      body {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        -webkit-text-size-adjust: 100%;
      }

      body {
        display: flex;
        background-color: var(--bg-canvas);
        color: var(--text-main);
      }

      /* --- Sidebar --- */
      .sidebar {
        width: 320px;
        background-color: var(--bg-sidebar);
        color: var(--white);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 100;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
      }

      .brand {
        padding: 30px 20px;
        font-size: 1.5rem;
        font-weight: 800;
        background: linear-gradient(to right, #60a5fa, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .menu {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
      }

      .menu-btn {
        background: rgba(255, 255, 255, 0.05);
        color: #cbd5e1;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 16px;
        border-radius: 12px;
        cursor: pointer;
        text-align: left;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .menu-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }

      /* --- Main Content --- */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .mobile-nav {
        display: none;
        background: #3b82f6;
        padding: 15px 20px;
        justify-content: space-between;
        align-items: center;
        color: white;
      }

      /* --- Custom Player UI --- */
      .custom-player {
        background: var(--player-bg);
        backdrop-filter: blur(10px);
        padding: 15px 30px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 50;
      }

      .play-trigger {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }

      .timeline-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .progress-wrapper {
        position: relative;
        height: 6px;
        background: #e2e8f0;
        border-radius: 3px;
        cursor: pointer;
      }

      .progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background: var(--primary);
        border-radius: 3px;
        width: 0%;
      }

      .time-info {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      /* --- Zoom Controls --- */
      .zoom-controls {
        position: absolute;
        bottom: 30px;
        right: 30px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 60;
      }

      .zoom-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: var(--white);
        border: 1px solid #e2e8f0;
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      /* --- PDF Display Container --- */
      .pdf-viewer {
        flex: 1;
        overflow: auto;
        background: #cbd5e1;
        position: relative;
        cursor: grab;
        display: flex;
        /* Using flex-start + margin auto on child to fix left-side clipping on zoom */
        justify-content: flex-start;
        align-items: flex-start;
        touch-action: none;
      }

      .pdf-viewer:active {
        cursor: grabbing;
      }

      #pdf-render-area {
        transform-origin: top left;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        /* Margin auto ensures centering when small, flex-start handles zoom overflow */
        margin: 0 auto;
      }

      canvas {
        max-width: 100%;
        height: auto !important;
        margin-bottom: 30px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        border-radius: 4px;
        background: white;
      }

      .welcome-screen {
        margin-top: 20vh;
        text-align: center;
        color: var(--text-muted);
        width: 100%;
      }

      /* --- Responsive --- */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .mobile-nav {
          display: flex;
        }
        .zoom-controls {
          bottom: 20px;
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <audio id="audio-engine"></audio>

    <aside class="sidebar" id="sidebar">
      <div class="brand">MyReader</div>
      <div class="menu" id="menu-list"></div>
    </aside>

    <main class="main-content">
      <header class="mobile-nav">
        <span style="font-weight: 700">MyReader</span>
        <button onclick="toggleSidebar()" style="background: none; border: none; color: white; cursor: pointer">
          <i data-lucide="menu"></i>
        </button>
      </header>

      <div class="custom-player" id="player-ui" style="display: none">
        <button class="play-trigger" id="play-btn" onclick="togglePlay()">
          <i data-lucide="play" id="play-icon"></i>
        </button>
        <div class="timeline-container">
          <div class="progress-wrapper" id="seek-bar">
            <div class="progress-bar" id="progress-fill"></div>
          </div>
          <div class="time-info">
            <span id="current-time">00:00</span>
            <span id="duration-time">00:00</span>
          </div>
        </div>
      </div>

      <div class="zoom-controls" id="zoom-ui" style="display: none">
        <button class="zoom-btn" onclick="changeZoom(0.15)"><i data-lucide="zoom-in"></i></button>
        <button class="zoom-btn" onclick="changeZoom(-0.15)"><i data-lucide="zoom-out"></i></button>
        <button class="zoom-btn" onclick="resetZoom()"><i data-lucide="maximize"></i></button>
      </div>

      <div class="pdf-viewer" id="viewer-container">
        <div id="pdf-render-area">
          <div class="welcome-screen">
            <i data-lucide="book-open" style="width: 64px; height: 64px; opacity: 0.2; margin-bottom: 20px"></i>
            <h2>მოგესალმებით</h2>
            <p>აირჩიეთ ფაილი დასაწყებად</p>
          </div>
        </div>
      </div>
    </main>

    <script>
      const files = [
        { title: "შესავალი", pdf: "reader1" },
        { title: "სიცოცხლის წარმოშობა", pdf: "reader2" },
        { title: "გენეტიკა. ეპიგენეტიკა", pdf: "reader3" },
        { title: "უჯრედული სისტემები", pdf: "reader4" },
        { title: "გენური ინჟინერია", pdf: "reader5" },
        { title: "დნმ-ის პროფილირება 1", pdf: "attachment1" },
        { title: "დნმ-ის პროფილირება 2", pdf: "attachment2" },
        //ADD//
      ];

      const pdfjsLib = window["pdfjs-dist/build/pdf"];
      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

      const audio = document.getElementById("audio-engine");
      const playBtn = document.getElementById("play-btn");
      const progressFill = document.getElementById("progress-fill");
      const seekBar = document.getElementById("seek-bar");
      const viewer = document.getElementById("viewer-container");
      const renderArea = document.getElementById("pdf-render-area");
      const playerUI = document.getElementById("player-ui");
      const zoomUI = document.getElementById("zoom-ui");

      let currentZoom = 1.0;
      let isDragging = false;
      let startX, startY;
      let scrollLeft, scrollTop;
      let autoScrollEnabled = true;
      let scrollTimeout;
      let lastAudioTime = 0;

      // Init Lucide
      lucide.createIcons();

      // Setup Menu
      const menuList = document.getElementById("menu-list");
      files.forEach((file) => {
        const btn = document.createElement("button");
        btn.className = "menu-btn";
        btn.innerHTML = `<i data-lucide="file-text"></i> ${file.title}`;
        btn.onclick = () => loadFile(file, btn);
        menuList.appendChild(btn);
      });

      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
      }

      async function loadFile(file, btn) {
        document.querySelectorAll(".menu-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        if (window.innerWidth < 768) document.getElementById("sidebar").classList.remove("open");

        playerUI.style.display = "flex";
        zoomUI.style.display = "flex";
        renderArea.innerHTML = '<p style="margin-top:20vh; color:#64748b;">იტვირთება დოკუმენტი...</p>';

        audio.pause();
        audio.currentTime = 0;
        lastAudioTime = 0;
        audio.src = `audio/${file.pdf}.mp3`;
        audio.load();
        resetPlayerUI();

        try {
          const loadingTask = pdfjsLib.getDocument(`pdf/${file.pdf}.pdf`);
          const pdf = await loadingTask.promise;
          renderArea.innerHTML = "";

          // Determine fitting scale for the first page
          const firstPage = await pdf.getPage(1);
          const unscaledViewport = firstPage.getViewport({ scale: 1.0 });

          // Calculate scale to fit width (leaving some padding for aesthetics)
          const containerWidth = viewer.clientWidth - 80; // Subtracting the 40px padding on each side
          const fitScale = containerWidth / unscaledViewport.width;

          // Reset zoom to 1.0, but apply the fitScale as the rendering baseline
          currentZoom = 1.0;

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            // Render at high resolution (fitScale * 2) but display at fitScale via transform
            const viewport = page.getViewport({ scale: fitScale * 2.0 });
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            // Use CSS to control the display size relative to the renderArea's scale(1)
            canvas.style.width = viewport.width / 2 + "px";

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            renderArea.appendChild(canvas);
          }

          applyZoom(); // Apply initial 1.0 scale
        } catch (err) {
          console.error(err);
          renderArea.innerHTML = `<div style="padding:40px; text-align:center;">შეცდომა ფაილის ჩატვირთვისას</div>`;
        }
      }

      // --- Grab and Pan Logic ---
      const startDragging = (e) => {
        isDragging = true;
        autoScrollEnabled = false;
        clearTimeout(scrollTimeout);

        const pageX = e.pageX || (e.touches ? e.touches[0].pageX : 0);
        const pageY = e.pageY || (e.touches ? e.touches[0].pageY : 0);

        startX = pageX - viewer.offsetLeft;
        startY = pageY - viewer.offsetTop;
        scrollLeft = viewer.scrollLeft;
        scrollTop = viewer.scrollTop;
      };

      const stopDragging = () => {
        isDragging = false;
        // Resume auto-scroll after 2 seconds of inactivity
        scrollTimeout = setTimeout(() => {
          autoScrollEnabled = true;
          lastAudioTime = audio.currentTime;
        }, 2000);
      };

      const moveDragging = (e) => {
        if (!isDragging) return;
        e.preventDefault();

        const pageX = e.pageX || (e.touches ? e.touches[0].pageX : null);
        const pageY = e.pageY || (e.touches ? e.touches[0].pageY : null);
        if (pageX === null) return;

        const x = pageX - viewer.offsetLeft;
        const y = pageY - viewer.offsetTop;
        const walkX = x - startX;
        const walkY = y - startY;

        viewer.scrollLeft = scrollLeft - walkX;
        viewer.scrollTop = scrollTop - walkY;
      };

      viewer.addEventListener("mousedown", startDragging);
      viewer.addEventListener("touchstart", startDragging, { passive: false });
      window.addEventListener("mouseup", stopDragging);
      window.addEventListener("touchend", stopDragging);
      window.addEventListener("mousemove", moveDragging);
      window.addEventListener("touchmove", moveDragging, { passive: false });

      // --- Zoom Logic ---
      function changeZoom(delta) {
        currentZoom = Math.max(currentZoom + delta, 0.1);
        applyZoom();
      }

      function resetZoom() {
        currentZoom = 1.0;
        applyZoom();
      }

      function applyZoom() {
        renderArea.style.transform = `scale(${currentZoom})`;
      }

      // --- Player Logic ---
      function togglePlay() {
        if (audio.paused) {
          lastAudioTime = audio.currentTime;
          audio.play();
        } else {
          audio.pause();
        }
      }

      audio.onplay = () => updatePlayIcon(true);
      audio.onpause = () => updatePlayIcon(false);

      function updatePlayIcon(isPlaying) {
        playBtn.innerHTML = isPlaying ? '<i data-lucide="pause"></i>' : '<i data-lucide="play"></i>';
        lucide.createIcons();
      }

      audio.ontimeupdate = () => {
        const duration = audio.duration;
        if (isNaN(duration)) return;

        const percent = (audio.currentTime / duration) * 100;
        progressFill.style.width = percent + "%";
        document.getElementById("current-time").innerText = formatTime(audio.currentTime);
        document.getElementById("duration-time").innerText = formatTime(duration);

        if (autoScrollEnabled && !audio.paused && !isDragging) {
          const timeDelta = audio.currentTime - lastAudioTime;
          if (timeDelta > 0) {
            const scrollMax = viewer.scrollHeight - viewer.clientHeight;
            const moveAmount = (timeDelta / duration) * scrollMax;
            viewer.scrollTop += moveAmount;
          }
        }
        lastAudioTime = audio.currentTime;
      };

      seekBar.onclick = (e) => {
        const rect = seekBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pos * audio.duration;
        lastAudioTime = audio.currentTime;
      };

      function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min.toString().padStart(2, "0")}:${sec.toString().padStart(2, "0")}`;
      }

      function resetPlayerUI() {
        progressFill.style.width = "0%";
        document.getElementById("current-time").innerText = "00:00";
        updatePlayIcon(false);
      }
    </script>
  </body>
</html>
